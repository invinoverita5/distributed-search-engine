<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: arial, sans-serif;
            background: #fff;
            min-height: 100vh;
        }

        /* Homepage mode - centered */
        .homepage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .homepage .logo {
            font-size: 92px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .homepage .logo .p1 { color: #4285f4; }
        .homepage .logo .e1 { color: #ea4335; }
        .homepage .logo .r { color: #fbbc05; }
        .homepage .logo .p2 { color: #4285f4; }
        .homepage .logo .l { color: #34a853; }
        .homepage .logo .e2 { color: #ea4335; }
        .homepage .logo .x { color: #4285f4; }
        .homepage .logo .i { color: #34a853; }
        .homepage .logo .t { color: #ea4335; }
        .homepage .logo .y { color: #4285f4; }

        .homepage .search-box {
            width: 100%;
            max-width: 584px;
        }

        .homepage .search-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
        }

        .homepage .search-input:hover,
        .homepage .search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .homepage .search-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .homepage .search-button {
            padding: 10px 16px;
            font-size: 14px;
            background: #f8f9fa;
            color: #3c4043;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            cursor: pointer;
        }

        .homepage .search-button:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* Results mode - header at top */
        .results-page {
            display: none;
        }

        .results-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #ebebeb;
            gap: 24px;
        }

        .results-header .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -1px;
            cursor: pointer;
            text-decoration: none;
        }

        .results-header .logo .p1 { color: #4285f4; }
        .results-header .logo .e1 { color: #ea4335; }
        .results-header .logo .r { color: #fbbc05; }
        .results-header .logo .p2 { color: #4285f4; }
        .results-header .logo .l { color: #34a853; }
        .results-header .logo .e2 { color: #ea4335; }
        .results-header .logo .x { color: #4285f4; }
        .results-header .logo .i { color: #34a853; }
        .results-header .logo .t { color: #ea4335; }
        .results-header .logo .y { color: #4285f4; }

        .results-header .search-box {
            flex: 1;
            max-width: 692px;
        }

        .results-header .search-input {
            width: 100%;
            padding: 10px 16px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 22px;
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,0.12);
        }

        .results-header .search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        .results-body {
            max-width: 652px;
            padding: 0 16px;
            margin-left: 150px;
        }

        .results-info {
            padding: 12px 0;
            color: #70757a;
            font-size: 14px;
        }

        .results-container {
            padding-bottom: 40px;
        }

        .result-item {
            margin-bottom: 24px;
        }

        .result-url {
            font-size: 14px;
            color: #202124;
            margin-bottom: 2px;
            word-break: break-all;
        }

        .result-url-text {
            color: #5f6368;
            font-size: 12px;
        }

        .result-title {
            font-size: 20px;
            color: #1a0dab;
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .result-title:visited {
            color: #681da8;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-snippet {
            font-size: 14px;
            color: #4d5156;
            line-height: 1.58;
        }

        .loading {
            padding: 40px 0;
            color: #70757a;
            font-size: 14px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #4285f4;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fce8e6;
            color: #c5221f;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        .no-results {
            padding: 40px 0;
            color: #70757a;
            font-size: 14px;
        }

        /* Show correct mode */
        body.showing-results .homepage {
            display: none;
        }

        body.showing-results .results-page {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Homepage mode -->
    <div class="homepage">
        <div class="logo">
            <span class="p1">P</span><span class="e1">e</span><span class="r">r</span><span class="p2">p</span><span class="l">l</span><span class="e2">e</span><span class="x">x</span><span class="i">i</span><span class="t">t</span><span class="y">y</span>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" id="homeSearchInput" placeholder="" autofocus>
        </div>
        <div class="search-buttons">
            <button class="search-button" id="homeSearchButton">Perplexity Search</button>
        </div>
    </div>

    <!-- Results mode -->
    <div class="results-page">
        <div class="results-header">
            <a class="logo" href="/" onclick="goHome(event)">
                <span class="p1">P</span><span class="e1">e</span><span class="r">r</span><span class="p2">p</span><span class="l">l</span><span class="e2">e</span><span class="x">x</span><span class="i">i</span><span class="t">t</span><span class="y">y</span>
            </a>
            <div class="search-box">
                <input type="text" class="search-input" id="resultsSearchInput">
            </div>
        </div>
        <div class="results-body">
            <div id="resultsInfo" class="results-info"></div>
            <div id="results" class="results-container"></div>
        </div>
    </div>

    <script>
        const homeSearchInput = document.getElementById('homeSearchInput');
        const homeSearchButton = document.getElementById('homeSearchButton');
        const resultsSearchInput = document.getElementById('resultsSearchInput');
        const resultsContainer = document.getElementById('results');
        const resultsInfo = document.getElementById('resultsInfo');

        function goHome(e) {
            if (e) e.preventDefault();
            history.pushState({}, '', '/');
            document.body.classList.remove('showing-results');
            homeSearchInput.value = '';
            homeSearchInput.focus();
        }

        async function performSearch(query) {
            if (!query) return;

            // Update URL
            history.pushState({}, '', `/?q=${encodeURIComponent(query)}`);

            // Switch to results mode
            document.body.classList.add('showing-results');
            resultsSearchInput.value = query;

            resultsContainer.innerHTML = '<div class="loading">Searching</div>';
            resultsInfo.textContent = '';

            const startTime = performance.now();

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                const endTime = performance.now();
                const duration = ((endTime - startTime) / 1000).toFixed(2);

                if (data.error && data.results.length === 0) {
                    resultsContainer.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`;
                    resultsInfo.textContent = '';
                } else if (data.results.length === 0) {
                    resultsContainer.innerHTML = '<div class="no-results">No results found for your query.</div>';
                    resultsInfo.textContent = `About 0 results (${duration} seconds)`;
                } else {
                    resultsInfo.textContent = `About ${data.results.length} results (${duration} seconds)`;

                    resultsContainer.innerHTML = data.results.map(result => `
                        <div class="result-item">
                            <div class="result-url">
                                <div>${escapeHtml(result.url)}</div>
                            </div>
                            <a href="${escapeHtml(result.url)}" class="result-title" target="_blank">${escapeHtml(result.title) || escapeHtml(result.url)}</a>
                            <div class="result-snippet">${escapeHtml(result.snippet)}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                resultsContainer.innerHTML = `<div class="error">Search failed: ${escapeHtml(error.message)}</div>`;
                resultsInfo.textContent = '';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners for homepage
        homeSearchButton.addEventListener('click', () => {
            performSearch(homeSearchInput.value.trim());
        });

        homeSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch(homeSearchInput.value.trim());
            }
        });

        // Event listeners for results page
        resultsSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch(resultsSearchInput.value.trim());
            }
        });

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            if (query) {
                performSearch(query);
            } else {
                document.body.classList.remove('showing-results');
            }
        });

        // Check for query param on page load
        (function init() {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            if (query) {
                performSearch(query);
            }
        })();
    </script>
</body>
</html>
